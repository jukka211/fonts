<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Links</title>
  <style>
    @font-face {
      font-family: "OOArketa";
      src: url("OOArketa-Regular.woff2") format("woff2"),
           url("OOArketa-Regular.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      font-family: "OOArketa", serif;
    }

    .links {
      position: absolute;
      top: 0;
      left: 0;
      padding: 14px;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .links a {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="links">
   <a href="/loop-font/">Loop Font</a>
    <a href="/broken-script/">Broken Script</a>
  </div>
</body>
</html>
